name: Daily NVDA Update

on:
  schedule:
    # Runs at 11:30 PM IST (18:00 UTC) on weekdays — after US market close
    - cron: "0 18 * * 1-5"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write      # needed to push data/ files back to repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python fetch_and_predict.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +'%Y-%m-%d')"
          git push
